# PatternFly v5 → v6 react-token mappings (226 mappings)
# Built from actual npm package exports:
#   @patternfly/react-tokens@5.4.0 (5582 exports)
#   @patternfly/react-tokens@6.4.0 (5961 exports)
# Cross-referenced with @patternfly/pf-codemods upstream data.
# All target names verified against actual v6 package exports.
#
# Source: https://github.com/patternfly/pf-codemods
#
# 7 tokens have no v6 equivalent (marked SKIP in upstream pf-codemods).
# Migration guidance per token:
#
#   global_BoxShadow_inset
#     Removed — v6 uses outset shadows only. Hardcode the CSS value if needed:
#     box-shadow: inset 0 0 0.625rem 0 rgba(3, 3, 3, 0.25);
#     Most v6 components use border-based focus indicators instead.
#
#   global_arrow_width / global_arrow_width_lg
#     Removed — arrow geometry is now component-internal (tooltip, popover).
#     If custom arrows: hardcode 0.9375rem (standard) / 1.5625rem (large).
#     PF component consumers need no action.
#
#   global_font_path / global_fonticon_path
#     Removed — font loading is now handled by your bundler, not CSS vars.
#     Configure font path resolution in Webpack/Vite config instead.
#
#   global_target_size_MinHeight / global_target_size_MinWidth
#     Removed — the 44px WCAG 2.5.8 target size is still enforced
#     per-component but no longer a global token. Hardcode 44px if needed.

